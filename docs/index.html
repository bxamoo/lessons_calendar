<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>習い事カレンダー</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>習い事カレンダー</h1>
  <div id="calendar"></div>

  <div id="event-popup" class="popup hidden" aria-hidden="true">
    <div class="popup-overlay" tabindex="-1"></div>
    <div class="popup-content" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <button type="button" class="popup-close" aria-label="閉じる">×</button>
      <h2 id="popupTitle"></h2>
      <p id="popupDate" class="popup-field"></p>
      <p id="popupTime" class="popup-field"></p>
      <label for="popupNote" class="popup-label">メモ</label>
      <textarea id="popupNote" class="popup-note" placeholder="ここにメモを入力できます"></textarea>
      <div class="popup-actions">
        <button type="button" class="popup-button popup-ok">OK</button>
        <button type="button" class="popup-button popup-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
